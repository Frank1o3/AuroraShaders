# ===========================================================
# Aurora Shaders - Configuration
# ===========================================================

silent=true

# ---------- Shadow map ----------
shadowMapResolution=1024
shadow.mapResolution=1024
shadowDistance=96.0
shadow.bias=0.85
shadow.enabled=true
shadow.cull.front=true

# ---------- G-Buffer formats ----------
# CRITICAL: RGBA16F required for HDR lighting pipeline.
# Without these, Iris defaults to RGBA8 which clips all light >1.0.
gbuffers.format.colortex0=RGBA16F
gbuffers.format.colortex1=RGB10_A2
gbuffers.format.colortex2=RGBA16F
gbuffers.format.colortex3=RGBA16F

# ---------- Composite buffer formats ----------
composite.format.colortex0=RGBA16F
composite.format.colortex1=RGBA8
composite.format.colortex2=RGBA16F
composite.format.colortex3=RGBA16F

composite1.format.colortex0=RGBA16F
composite1.format.colortex1=RGBA16F
composite1.format.colortex2=RGBA16F
composite1.format.colortex3=RGBA16F

composite2.format.colortex0=RGBA16F
composite2.format.colortex1=RGBA16F
composite2.format.colortex2=RGBA16F
composite2.format.colortex3=RGBA16F

composite3.format.colortex0=RGBA16F
composite3.format.colortex1=RGBA16F

composite4.format.colortex0=RGBA16F

# Final output back buffer
composite.final=RGBA16F

# ---------- Water rendering ----------
gbuffers_water.is_transparent=true

# ---------- Vanilla features ----------
clouds=off
underwaterOverlay=false
sun=true
moon=true
stars=true
rain=true
vignette=false
separateAo=true

# ===========================================================
# Profiles
# ===========================================================
profile.LOW=qualityLevel=0 shadowMapResolution=512
profile.MEDIUM=qualityLevel=1 shadowMapResolution=1024
profile.HIGH=qualityLevel=2 shadowMapResolution=1024

# ===========================================================
# Option definitions
# ===========================================================
option.qualityLevel=1 [0:2]
option.shadowMapResolution=1024 [512:4096]
option.fogDensity=0.0085 [0.0:0.035]
option.fogHeightFalloff=0.010 [0.0:0.05]
option.ambientStrength=0.20 [0.0:1]
option.specularStrength=0.35 [0.0:1.0]
option.roughness=0.65 [0.0:0.95]
option.sunIntensity=1.0 [0.0:2.0]
option.sunSize=1.0 [0.0:2.0]
option.moonIntensity=0.35 [0.0:2.0]
option.cloudSpeed=0.35 [0.0:1.0]
option.cloudDensity=0.45 [0.0:0.9]
option.cloudHeight=0.62 [0.0:0.9]
option.exposureMin=0.35 [0.0:1.0]
option.exposureMax=2.25 [1.0:4.5]
option.bloomThreshold=1.2 [0.1:3.0]
option.HALF_RES_SSAO=false
option.HALF_RES_BLOOM=false
option.HALF_RES_GODRAYS=false
option.shadowSoftness=1.5 [0.0:4.0]
option.SATURATION=1.05 [0.0:2.0]
option.CONTRAST=1.03 [0.0:2.0]
option.EXPOSURE_ADAPT_SPEED=1.5 [0.0:5.0]
option.SSAO_RADIUS=0.8 [0.0:2.0]
option.SSAO_BIAS=0.025 [0.005:0.1]
option.AO_STRENGTH=1.0 [0.0:2.0]
option.BLOOM_STRENGTH=1.0 [0.0:2.0]
option.WAVING_FOLIAGE=1 [0:1]
option.WATER_REFLECT=1 [0:1]

# ===========================================================
# Screens
# ===========================================================
screen=<profile> [PERFORMANCE] [SHADOWS] [LIGHTING] [POST_PROCESSING] [ANIMATIONS]

screen.PERFORMANCE=qualityLevel HALF_RES_SSAO HALF_RES_BLOOM HALF_RES_GODRAYS
screen.SHADOWS=shadowMapResolution shadowSoftness
screen.LIGHTING=ambientStrength specularStrength roughness sunIntensity sunSize moonIntensity SATURATION CONTRAST EXPOSURE_ADAPT_SPEED exposureMin exposureMax
screen.POST_PROCESSING=fogDensity fogHeightFalloff cloudSpeed cloudDensity cloudHeight SSAO_RADIUS SSAO_BIAS AO_STRENGTH bloomThreshold BLOOM_STRENGTH
screen.ANIMATIONS=WAVING_FOLIAGE WATER_REFLECT

# Sliders
sliders=SATURATION CONTRAST EXPOSURE_ADAPT_SPEED exposureMin exposureMax shadowMapResolution shadowSoftness fogDensity fogHeightFalloff ambientStrength specularStrength roughness sunIntensity sunSize moonIntensity cloudSpeed cloudDensity cloudHeight SSAO_RADIUS SSAO_BIAS AO_STRENGTH bloomThreshold BLOOM_STRENGTH
